<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="star-field"></div>
  <div class="container">
    <h1>Todo List</h1>

    <form id="add-form">
      <input
        type="text"
        id="new-title"
        placeholder="What needs to be done?"
        autocomplete="off"
        required
      />
      <button type="submit">Add</button>
    </form>

    <ul id="task-list"></ul>

    <p id="empty-msg" class="empty-msg hidden">No tasks yet. Add one above!</p>
    <p id="error-msg" class="error-msg hidden"></p>
  </div>

  <script>
    const API = "/tasks";

    const taskList  = document.getElementById("task-list");
    const emptyMsg  = document.getElementById("empty-msg");
    const errorMsg  = document.getElementById("error-msg");
    const addForm   = document.getElementById("add-form");
    const newTitle  = document.getElementById("new-title");

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.classList.remove("hidden");
      setTimeout(() => errorMsg.classList.add("hidden"), 4000);
    }

  function renderTasks(tasks) {
    taskList.innerHTML = "";
    emptyMsg.classList.toggle("hidden", tasks.length > 0);

    tasks.forEach(task => {
      const li = document.createElement("li");
      li.className = "task-item" + (task.completed ? " completed" : "");
      
      
      li.dataset.id = task._id; 

      li.innerHTML = `
        <label class="checkbox-label">
          <input type="checkbox" class="toggle-cb" ${task.completed ? "checked" : ""} />
          <span class="title-text">${escapeHtml(task.title)}</span>
        </label>
        <div class="actions">
          <button class="btn-edit" title="Edit">&#9998;</button>
          <button class="btn-delete" title="Delete">&#10005;</button>
        </div>
      `;

      li.querySelector(".toggle-cb").addEventListener("change", () => {toggleTask(task._id, !task.completed, task.title); });
      li.querySelector(".btn-delete").addEventListener("click", () => deleteTask(task._id));
      const editBtn = li.querySelector(".btn-edit");
      editBtn.type = "button";
      editBtn.onclick = () => startEdit(li, task);

      taskList.appendChild(li);
    });
  }

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, c => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[c]));
    }

    async function loadTasks() {
      try {
        const res  = await fetch(API);
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Failed to load tasks");
        renderTasks(data);
      } catch (e) {
        showError(e.message);
      }
    }

    async function createTask(title) {
      const res  = await fetch(API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ title }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || "Failed to create task");
      
      // FIX: Change 'data.data' to 'data.new_task' to match HAFRADA_models.py
      return data.new_task; 
    }


    async function toggleTask(id, completed, currentTitle) {
      const res = await fetch(`${API}/${id}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ 
            title: currentTitle, 
            completed: completed 
        }),
      });

      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        showError(data.error || data.message || "Failed to update task");
      } else {
        await loadTasks();
      }
    }

    async function saveEdit(id, newTitleValue, isCompleted) {
      try {
        const body = { title: newTitleValue };
        if (typeof isCompleted !== "undefined") {
          body.completed = isCompleted;
        }

        const res = await fetch(`${API}/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.message || data.error || "Failed to update task");
        }

        await loadTasks();
      } catch (e) {
        showError(e.message);
      }
    }

    async function deleteTask(id) {
      const res  = await fetch(`${API}/${id}`, { method: "DELETE" });
      
      if (!res.ok) {
        const data = await res.json();
        throw new Error(data.error || "Failed to delete task");
      }
      loadTasks();
    }


    function startEdit(li, task) {
          const label = li.querySelector(".checkbox-label");
          const titleSpan = label.querySelector(".title-text"); 
          const editBtn = li.querySelector(".btn-edit");

          const input = document.createElement("input");
          input.type = "text";
          input.className = "edit-input";
          input.value = task.title;

          input.onclick = (e) => e.stopPropagation();

          if (label && titleSpan) {
            label.replaceChild(input, titleSpan);
          }
          
          editBtn.textContent = "Save";
          input.focus();

          const performSave = () => {
            const val = input.value.trim();
            if (val) {
              saveEdit(task._id, val, task.completed);
            } else {
              showError("Title cannot be empty");
            }
          };

          editBtn.onclick = (e) => {
            e.preventDefault();
            e.stopPropagation();
            performSave();
          };

          input.addEventListener("keydown", e => {
            if (e.key === "Enter") {
              e.preventDefault();
              e.stopPropagation();
              performSave();
            }
            if (e.key === "Escape") {
              e.stopPropagation();
              loadTasks();
            }
          });
        }


    addForm.addEventListener("submit", async e => {
      e.preventDefault();
      const title = newTitle.value.trim();
      if (!title) return;
      try {
        await createTask(title);
        newTitle.value = "";
        loadTasks();
      } catch (e) {
        showError(e.message);
      }
    });

    loadTasks();
  </script>
</body>
</html>
